<form (ngSubmit)="onSubmit()" #form>
  <app-control label="Title">
    <input type="text" name="title" id="title" #input [(ngModel)]="enteredTitle">
  </app-control>
  <app-control label="Request">
    <textarea type="text" name="request" id="request" rows="3" #input [(ngModel)]="enteredTextarea"></textarea>
  </app-control>
  <p>
    <button text="Submit" icon="▷" appButton></button>
  </p>
</form>
