<app-header />

<main>
  <div id="dashboard">
    <app-dashbpard-item
      [image]="{ src: 'status.png', alt: 'A signal symbol' }"
      title="Server Status"
    >
      <app-server-status />
    </app-dashbpard-item>

    <app-dashbpard-item
      [image]="{ src: 'globe.png', alt: 'A globe symbol' }"
      title="Traffic"
    >
      <app-traffic />
    </app-dashbpard-item>

    <app-dashbpard-item
      [image]="{ src: 'list.png', alt: 'A list of items' }"
      title="Support Tickets"
    >
      <app-tickets />
    </app-dashbpard-item>
  </div>
</main>
